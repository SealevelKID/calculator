<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>時間計算機 App版 (教學最小單位版)</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --calc-bg: #2c3e50;
            --screen-bg: #ecf0f1;
            --btn-num: #ffffff;
            --btn-op: #f39c12;
            --btn-unit: #3498db;
            --btn-ac: #e74c3c;
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --ans-color: #27ae60;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .calculator {
            background-color: var(--calc-bg);
            border-radius: 20px;
            padding: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .screen {
            background-color: var(--screen-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: right;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .history {
            font-size: 1.1rem;
            color: #7f8c8d;
            min-height: 1.5rem;
            word-wrap: break-word;
            border-bottom: 1px dashed #bdc3c7;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .process {
            font-size: 1rem;
            color: #34495e;
            white-space: pre-line;
            text-align: left;
            flex-grow: 1;
            line-height: 1.5;
            font-family: monospace;
        }

        .current {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--ans-color);
            word-wrap: break-word;
            text-align: right;
            margin-top: 5px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 10px;
            font-size: 1.15rem;
            font-weight: bold;
            padding: 5px 0;
            min-height: 55px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
            color: var(--text-dark);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }

        .btn-num { background-color: var(--btn-num); }
        .btn-unit { background-color: var(--btn-unit); color: var(--text-light); }
        .btn-op { background-color: var(--btn-op); color: var(--text-light); font-size: 1.4rem; }
        .btn-ac { background-color: var(--btn-ac); color: var(--text-light); }
        .span-2 { grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="screen">
        <div class="history" id="history-screen"></div>
        <div class="process" id="process-screen"></div>
        <div class="current" id="current-screen" style="color: #2c3e50;">0</div>
    </div>

    <div class="keypad">
        <button class="btn-unit" onclick="inputUnit('日', 'd')">日</button>
        <button class="btn-unit" onclick="inputUnit('時', 'h')">時</button>
        <button class="btn-unit" onclick="inputUnit('分', 'm')">分</button>
        <button class="btn-unit" onclick="inputUnit('秒', 's')">秒</button>

        <button class="btn-ac span-2" onclick="clearAll()">AC (清除)</button>
        <button class="btn-ac" onclick="deleteLast()" style="background-color: #c0392b;">DEL</button>
        <button class="btn-op" onclick="inputOperator('÷')">÷</button>

        <button class="btn-num" onclick="inputDigit('7')">7</button>
        <button class="btn-num" onclick="inputDigit('8')">8</button>
        <button class="btn-num" onclick="inputDigit('9')">9</button>
        <button class="btn-op" onclick="inputOperator('×')">×</button>

        <button class="btn-num" onclick="inputDigit('4')">4</button>
        <button class="btn-num" onclick="inputDigit('5')">5</button>
        <button class="btn-num" onclick="inputDigit('6')">6</button>
        <button class="btn-op" onclick="inputOperator('-')">-</button>

        <button class="btn-num" onclick="inputDigit('1')">1</button>
        <button class="btn-num" onclick="inputDigit('2')">2</button>
        <button class="btn-num" onclick="inputDigit('3')">3</button>
        <button class="btn-op" onclick="inputOperator('+')">+</button>

        <button class="btn-num span-2" onclick="inputDigit('0')">0</button>
        <button class="btn-op span-2" onclick="calculate()" style="background-color: #27ae60;">= (計算)</button>
    </div>
</div>

<script>
    const unitNames = { 'd': '日', 'h': '時', 'm': '分', 's': '秒' };
    const unitHierarchy = { 'd': 4, 'h': 3, 'm': 2, 's': 1 };
    
    // 單位換算倍率表：目標單位 -> 來源單位的倍數
    const multipliers = {
        'h': { 'd': 24, 'h': 1 },
        'm': { 'd': 1440, 'h': 60, 'm': 1 },
        's': { 'd': 86400, 'h': 3600, 'm': 60, 's': 1 },
        'd': { 'd': 1 }
    };

    let tokens = []; 
    let currentNumber = ""; 
    let isCalculated = false; 

    const historyScreen = document.getElementById('history-screen');
    const processScreen = document.getElementById('process-screen');
    const currentScreen = document.getElementById('current-screen');

    function updateDisplay() {
        let historyStr = tokens.map(t => t.display).join(" ");
        historyScreen.innerText = historyStr;
        processScreen.innerText = ""; 
        currentScreen.style.color = "#2c3e50"; 
        currentScreen.innerText = currentNumber || (tokens.length === 0 ? "0" : "");
    }

    function inputDigit(digit) {
        if (isCalculated) clearAll();
        if (currentNumber === "0" && digit === "0") return;
        if (currentNumber === "0" && digit !== "0") currentNumber = "";
        currentNumber += digit;
        updateDisplay();
    }

    function inputUnit(unitName, unitKey) {
        if (isCalculated) isCalculated = false;
        if (currentNumber === "") return; 

        tokens.push({ type: 'time', val: parseInt(currentNumber), unit: unitName, key: unitKey, display: currentNumber + unitName });
        currentNumber = "";
        updateDisplay();
    }

    function inputOperator(op) {
        if (isCalculated) isCalculated = false;

        if (currentNumber !== "" && tokens.length === 0) {
            alert("請先為數字選擇時間單位 (日/時/分/秒)！");
            return;
        }
        
        if (tokens.length > 0 && tokens[tokens.length - 1].type === 'op' && currentNumber === "") {
            tokens[tokens.length - 1] = { type: 'op', val: op, display: op };
        } else {
            if (currentNumber !== "") {
                tokens.push({ type: 'num', val: parseFloat(currentNumber), display: currentNumber });
                currentNumber = "";
            }
            tokens.push({ type: 'op', val: op, display: op });
        }
        updateDisplay();
    }

    function deleteLast() {
        if (isCalculated) { clearAll(); return; }
        
        if (currentNumber !== "") {
            currentNumber = currentNumber.slice(0, -1);
        } else if (tokens.length > 0) {
            tokens.pop();
        }
        updateDisplay();
    }

    function clearAll() {
        tokens = [];
        currentNumber = "";
        isCalculated = false;
        processScreen.innerText = "";
        currentScreen.style.color = "#2c3e50";
        updateDisplay();
        currentScreen.innerText = "0";
    }

    // 取得算式中最小的單位
    function getMinUnitKey(tokenArr) {
        let minLevel = 4;
        let minKey = 'd';
        tokenArr.forEach(t => {
            if (t.type === 'time' && unitHierarchy[t.key] < minLevel) {
                minLevel = unitHierarchy[t.key];
                minKey = t.key;
            }
        });
        return minKey;
    }

    // 將時間轉換為指定最小單位，並產生教學用的算式字串
    function buildConversion(tokenArr, minUnitKey) {
        let total = 0;
        let exprParts = [];
        
        tokenArr.forEach(t => {
            if(t.type === 'time') {
                let mul = multipliers[minUnitKey][t.key];
                let convertedVal = t.val * mul;
                total += convertedVal;
                
                if(mul > 1) {
                    exprParts.push(`${mul}×${t.val}`);
                } else {
                    if (t.val > 0 || tokenArr.length === 1) {
                        exprParts.push(`${t.val}`);
                    }
                }
            }
        });

        let targetUnitName = unitNames[minUnitKey];
        let originalStr = tokenArr.map(t => t.display).join("");

        if (exprParts.length === 0) exprParts.push("0");

        // 如果只有一個單位且已經是最小單位，不顯示冗長的換算
        if (tokenArr.length === 1 && tokenArr[0].key === minUnitKey) {
            return { total: total, str: `${originalStr}` }; 
        }

        let exprStr = exprParts.join(" + ");
        return { total: total, str: `${originalStr} = ${exprStr} = ${total}${targetUnitName}` };
    }

    function calculate() {
        if (tokens.length === 0 && currentNumber === "") return;

        if (currentNumber !== "") {
            tokens.push({ type: 'num', val: parseFloat(currentNumber), display: currentNumber });
            currentNumber = "";
        }

        let opIndex = tokens.findIndex(t => t.type === 'op');
        let minUnitKey = getMinUnitKey(tokens);
        let uName = unitNames[minUnitKey];

        let resultStr = "";
        let processStr = "";

        if (opIndex === -1) {
            // 單純化聚
            let conv = buildConversion(tokens, minUnitKey);
            processStr = `① 總計換算：\n   • ${conv.str}\n② 重新化聚：`;
            showResult(formatFromUnit(conv.total, minUnitKey), processStr, tokens);
            return;
        }

        let leftTokens = tokens.slice(0, opIndex);
        let rightTokens = tokens.slice(opIndex + 1);
        let operator = tokens[opIndex].val;

        let convA = buildConversion(leftTokens, minUnitKey);
        let valA = convA.total;
        
        let valB = 0;
        let numB = 0;
        let convB = null;
        let rightIsTime = rightTokens.some(t => t.type === 'time');

        if (rightIsTime) {
            convB = buildConversion(rightTokens, minUnitKey);
            valB = convB.total;
        } else {
            if (rightTokens.length === 1 && rightTokens[0].type === 'num') {
                numB = rightTokens[0].val;
            } else {
                alert("運算式有誤，請檢查"); return;
            }
        }

        try {
            processStr = `① 換算為最小單位 (${uName})：\n   • ${convA.str}\n`;
            if (rightIsTime && convB.str !== convA.str) {
                processStr += `   • ${convB.str}\n`;
            }

            if (operator === '+') {
                if (!rightIsTime) throw "加法必須是「時間 + 時間」";
                processStr += `② 運算：${valA}${uName} + ${valB}${uName} = ${valA + valB}${uName}\n③ 化聚：`;
                resultStr = formatFromUnit(valA + valB, minUnitKey);
            } 
            else if (operator === '-') {
                if (!rightIsTime) throw "減法必須是「時間 - 時間」";
                if (valA < valB) throw "結果不能為負數";
                processStr += `② 運算：${valA}${uName} - ${valB}${uName} = ${valA - valB}${uName}\n③ 化聚：`;
                resultStr = formatFromUnit(valA - valB, minUnitKey);
            } 
            else if (operator === '×') {
                if (rightIsTime) throw "乘法必須是「時間 × 倍數」";
                processStr += `② 運算：${valA}${uName} × ${numB} = ${valA * numB}${uName}\n③ 化聚：`;
                resultStr = formatFromUnit(valA * numB, minUnitKey);
            } 
            else if (operator === '÷') {
                if (rightIsTime) {
                    if (valB === 0) throw "除數不能為零";
                    let multiple = valA / valB;
                    processStr += `② 運算：${valA}${uName} ÷ ${valB}${uName}\n③ 計算倍數：`;
                    resultStr = (multiple % 1 === 0 ? multiple : multiple.toFixed(2)) + " (倍)";
                } else {
                    if (numB === 0) throw "除數不能為零";
                    processStr += `② 運算：${valA}${uName} ÷ ${numB} = ${valA / numB}${uName}\n③ 化聚：`;
                    resultStr = formatFromUnit(valA / numB, minUnitKey);
                }
            }
            
            showResult(resultStr, processStr, tokens);

        } catch (error) {
            alert(error);
            let lastToken = tokens.pop();
            if(lastToken.type === 'num') currentNumber = lastToken.val.toString();
            updateDisplay();
        }
    }

    function showResult(result, processText, historyTokens) {
        historyScreen.innerText = historyTokens.map(t => t.display).join(" ") + " =";
        processScreen.innerText = processText;
        currentScreen.style.color = "var(--ans-color)"; 
        currentScreen.innerText = result;
        tokens = [];
        currentNumber = "";
        isCalculated = true;
    }

    // 將單一數值從最小單位轉換回標準的 日/時/分/秒 格式
    function formatFromUnit(totalValue, fromUnitKey) {
        if (totalValue === 0) return "0" + unitNames[fromUnitKey];
        
        let totalSeconds = 0;
        if (fromUnitKey === 'd') totalSeconds = totalValue * 86400;
        if (fromUnitKey === 'h') totalSeconds = totalValue * 3600;
        if (fromUnitKey === 'm') totalSeconds = totalValue * 60;
        if (fromUnitKey === 's') totalSeconds = totalValue;

        // 處理浮點數除法可能產生的微小誤差
        totalSeconds = Math.round(totalSeconds * 1000) / 1000;

        let d = Math.floor(totalSeconds / 86400);
        let h = Math.floor((totalSeconds % 86400) / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = Math.round(totalSeconds % 60);

        let result = "";
        if (d > 0) result += d + "日 ";
        if (h > 0 || d > 0) result += h + "時 ";
        if (m > 0 || h > 0 || d > 0) result += m + "分 ";
        if (s > 0 || result === "") result += s + "秒";
        
        return result.trim();
    }
</script>

</body>
</html>
